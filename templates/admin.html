<!DOCTYPE html>
<html>
<head>
    <title>Nexus Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial; background: #0f0f0f; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #1a1a1a; padding: 40px; border-radius: 10px; width: 350px; border: 1px solid #333; }
        h2 { color: #00ff41; text-align: center; margin-bottom: 20px; font-family: monospace; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 5px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #00ff41; color: black; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .error { color: #ff4141; text-align: center; margin-top: 10px; font-size: 14px; }
        .logo { text-align: center; font-size: 14px; color: #00ff41; font-family: monospace; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">[ NEXUS HONEYPOT v2.0 ]</div>
        <h2>⚡ ADMIN ACCESS</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">ACCESS SYSTEM</button>
        </form>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
