<!DOCTYPE html>
<html>
<head>
    <title>SecureBank — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: white; padding: 40px; border-radius: 10px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #1a1a2e; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #1a1a2e; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #16213e; }
        .error { color: red; text-align: center; margin-top: 10px; font-size: 14px; }
        .logo { text-align: center; font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">🏦</div>
        <h2>SecureBank Login</h2>
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username or Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
